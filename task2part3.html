<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 part 3</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body{
             display:block;
            justify-content: center;
            align-items: center;
        }
        section{
            justify-content: center;
            align-items: center;
            background: linear-gradient(120deg, #3b93a2  , #80ff72 ) ;
           margin: 60px;
            padding: 30px;
          
            text-align: center;
            border-radius: 10px;
            width:700px;
            position: fixed;
        }
        .login-group{
            justify-content: center;
            background-color: white;
       width: 650px;
            height: 400px;
          
            border-radius: 10px;
        }
        .login-group h1{
            text-align: center;
            color:#008080 ;
        }
     .login-group .input-group
        input[type="email"],
        input[type="password"]{
    
     margin: 10px;
      height: 45px;
      width: 300px;
      border: 1px solid #ddd;
      border-radius: 4px;
            font-size: 15px;
       
        
        }
.checkbox{
   display: flex;
            align-items:start;
            justify-content: start;
            font-size: 13px;
            margin: 20px 180px;
            gap: 3px;
    
}
.btn-signin{
    width: 50%;
            padding: 12px;
            background-color: #008080;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
           
}
a{
    text-decoration: none;
    color: #008080;
}
.link{
    margin: 30px;
}



    </style>
</head>
<body>
    <section>
        <div class="login-group">
            <h1>Login</h1>
            <div class="input-group">
            <input type="email" placeholder="Email">
            </div>
            <div class="input-group">
            <input type="password" placeholder="Password">
            </div>
       <div class="checkbox">
        <label>
            <input type="checkbox">
            Show Password
        </label>

       </div>
       <button class="btn-signin"type="submit">SIGN IN</button>
       <div class="link">
            <p>Frogot <a href="/">Username / Password</a>?</p>
            <p>Dont have an account ? <a href="/">Sign Up</a></p>
        </div>
        </div>
        
    </section>
    
</body>
</html>
