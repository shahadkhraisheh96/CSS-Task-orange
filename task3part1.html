<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Task 3 Part 1 </title>
    <style>
       
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        body {
            
            background: linear-gradient(135deg, #cbdcf7 0%, #b2b9f0 100%);
            min-height: 100vh;
            display: flex; 
            justify-content: center;
            align-items: center;
        }

     
        section {
            background-color: #898dd1; 
            padding: 30px;
            width: 80%;
            max-width: 450px;
            border-radius: 20px;; 
            text-align: center;
            color: white;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
        }

       
        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            background-color: white;
          
        }

        .input-group {
            margin-bottom: 15px;
        }

     
        .terms {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            margin: 20px 0;
            gap: 8px;
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background-color: #b7b7b7; 
            color: #4a4a4a;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
           
        }

        .btn-signup:hover {
            background-color: #d1d1d1;
        }

        .footer-links {
            margin-top: 20px;
            font-size: 13px;
        }

        .footer-links a {
            color: white;
            text-decoration: underline;
        }

       
    </style>
</head>
<body>

    <section>
        <h1>Sign Up</h1>

        <form>
            <div class="name-row">
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
            </div>

            <div class="input-group">
                <input type="email" placeholder="Email">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Password">
            </div>

            <div class="input-group">
                <input type="password" placeholder="Confirm Password">
            </div>

            <div class="terms">
                <input type="checkbox" id="terms">
                <label for="terms">I accept the Terms of Use & Privacy Policy</label>
            </div>

            <button type="submit" class="btn-signup">Sign Up</button>
        </form>

        <div class="footer-links">
            <p>Already have an account? <a href="#">Login here</a></p>
        </div>

        <div class="copyright">
            Copyright &copy; YourCompany.com
        </div>
    </section>

</body>
</html>
