<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 6 part 3</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap:10px;
            padding: 10px;

        }
        .header{
            grid-column: span 2;
            background-color: black;
            height: 70px;
        }
        .main{
            background-color: orange;
            height: 230px;

        }
        .main2{
            background-color: green;
            height: 230px;
        }
        .footer{
            grid-column:  span 2;
            background-color: blue;
            height: 70px;
        }
    </style>
</head>
<body>
    <div class="container">
       <div class="header">
       </div>

        
        <div class="main">

        </div>
        <div class="main2">

        </div>
        <div class="footer">

        </div>
    </div>
    
</body>
</html>
