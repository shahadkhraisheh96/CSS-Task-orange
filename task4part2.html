<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task 4 part 2</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        section{
            background-color: rgb(52, 172, 242);
            justify-content: center;
            align-items: center;
            padding: 20px 100px;
       
           
        }
        .login-form{
            background-color: aliceblue;
            border-radius: 20px;
            justify-content: center;
             display: flex;
            flex-direction: column;
            padding: 50px;
                 box-shadow:5px 5px 5px  darkgrey;
        }
        .login-header{
            text-align: center;
            
        }
        .login-header h1{
           font-weight: none;
        }
        .input-group{
            justify-content: center;
            padding: 10px;
            text-align: left;
             margin-bottom: 15px;
             display: flex;
            flex-direction: column;

        }
         .input-group input{
            padding: 12px;
            border: 1px solid #d1d9e6;
            border-radius: 8px;
            outline: none;
            background-color: #f9fbff;
            font-size: 15px;
         }
        button{
           display: block;
            margin: 20px auto 0; 
            padding: 12px 30px;
            background-color: #4da3ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

    </style>
</head>
<body>
    <section>
        <div class="login-form">
            <div class="login-header">
                <h1>CODEWITHRANDOM</h1>
                <p>Thank you for Being with me</p>
            </div>
            <div class="input-group">
                <label>Name</label>
                <input type="text">
            </div>
             <div  class="input-group">
                <label>E-mail</label>
                <input type="email">
            </div>
             <div  class="input-group">
                <label>Password</label>
                <input type="email">
            </div>
             <div  class="input-group">
                <label>Repeat password</label>
                <input type="password">
            </div>
            <button type="submit">Register</button>
        </div>
    </section>
    
</body>
</html>
